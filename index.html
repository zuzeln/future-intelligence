  .brand-mark {

    background: var(--accent);
    border-radius: 6px;
    position: relative;
  }
  .brand-mark::after {
    content: '';
    position: absolute;
    top: 6px; left: 6px;
    width: 8px; height: 8px;
    background: var(--bg);
    border-radius: 2px;
  }
  .brand h1 {
    font-size: 1.4em;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: var(--text-primary);
  }
  .brand span {
    font-size: 0.75em;
    color: var(--text-tertiary);
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hero {
    margin-bottom: 56px;
    padding-bottom: 40px;
    border-bottom: 1px solid var(--border);
  }
  .hero h2 {
    font-size: 2em;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
    letter-spacing: -0.3px;
  }
  .hero p {
    font-size: 1.05em;
    color: var(--text-secondary);
    max-width: 600px;
  }

    display: inline-block;
    margin-top: 20px;
    padding: 5px 14px;
    background: rgba(74, 158, 255, 0.08);

    border-radius: 20px;
    font-size: 0.82em;
    color: var(--accent);
  }

  /* Trend Card */
  .trend-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px 32px;
    margin-bottom: 20px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .trend-card:hover { background: var(--surface-hover); border-color: #2a3340; }
  .trend-card.expanded { border-color: var(--accent-dim); background: var(--surface-hover); }

    position: absolute;
    top: 28px;
    right: 32px;
    font-size: 0.78em;
    color: var(--text-tertiary);
    font-weight: 500;

  .trend-card h3 {
    font-size: 1.25em;
    font-weight: 700;
    color: #fff;
    margin-bottom: 12px;
    padding-right: 60px;
    letter-spacing: -0.2px;

    font-size: 0.95em;
    color: var(--accent);
    margin-bottom: 16px;
    line-height: 1.7;
  }
  .trend-card .meta-row {

    gap: 24px;
    font-size: 0.82em;
    color: var(--text-tertiary);
    flex-wrap: wrap;

  .trend-card .meta-row .signal-count { color: var(--accent); font-weight: 600; }

    margin-top: 24px;

    border-top: 1px solid var(--border);

    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 10px;

    position: relative;
  }
  .detail-section ul li::before {
    content: '';
    position: absolute;
    left: 0; top: 12px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent-dim);

    border-radius: 14px;
    font-size: 0.82em;
    font-weight: 500;

  .signal-item a {
    color: var(--accent);

    font-size: 0.82em;
  }

  .archive-toggle {
    text-align: center;
    margin-top: 48px;
    padding: 12px;
    color: var(--text-tertiary);
    font-size: 0.85em;
    cursor: pointer;

              <div class="signal-title">${escapeHtml(s.title)}</div>
              <div class="signal-summary">${escapeHtml(s.summary)}</div>
              <a href="${escapeHtml(s.url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">阅读原文</a>
            </div>
          `).join('')}
        </div>
      </div>
    </div>
  `).join('');

  // Archive
  document.getElementById('archiveSection').innerHTML = ARCHIVE_DATA.map(item => `
    <div class="archive-item">
      <strong>${escapeHtml(item.title)}</strong>
      <span style="color:var(--text-tertiary);font-size:0.82em"> — ${item.source} · ${item.time}</span>
      <div style="margin-top:4px;font-size:0.85em">${escapeHtml(item.summary)}</div>
      <a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">阅读原文</a>
    </div>
  `).join('');
  document.getElementById('archiveLabel').textContent = `归档区 · ${ARCHIVE_DATA.length} 条`;
}

function toggleTrend(id) {
  const card = document.getElementById('trend-' + id);
  card.classList.toggle('expanded');
}

function toggleArchive() {
  document.getElementById('archiveSection').classList.toggle('open');
}

function getUpdateTime(trend) {
  const times = trend.signals.map(s => s.time).filter(Boolean);
  if (times.length === 0) return '';
  return '最新信号 ' + times[0];
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('updateTime').textContent = '更新于 2026-06-28 凌晨 · 基于过去24小时信号分析';

renderTrends();
</script>
</body>
</html>
