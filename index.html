<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0e14;
  --surface: #11161e;
  --surface-hover: #161c26;
  --border: #1e2632;
  --text-primary: #e6e8ec;
  --text-secondary: #8b919c;
  --text-tertiary: #5c626e;
  --accent: #4a9eff;
  --accent-dim: #2d5a8c;
  --accent-glow: rgba(74,158,255,0.12);
  --success: #3fb950;
  --warning: #d29922;
  --danger: #f85149;

  /* Edit mode */
  --edit-border: rgba(248,81,73,0.35);
  --edit-hl: rgba(74,158,255,0.08);
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
.container { max-width: 720px; margin: 0 auto; padding: 40px 20px 80px; }

/* Brand */
.brand { padding: 24px 0 16px; }
.brand h1 { font-size: 1.6em; font-weight: 800; letter-spacing: -0.5px; }
.brand span { font-size: 0.78em; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 2px; }

/* Hero */
.hero { padding: 32px 0 8px; }
.hero h2 { font-size: 1.8em; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 8px; }
.hero .subtitle { font-size: 0.9em; color: var(--text-secondary); line-height: 1.6; margin-bottom: 15px; }
.update-badge {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 0.78em; color: var(--text-tertiary);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 6px 14px;
}

/* Trend Cards */
.trend-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px 30px; margin-bottom: 18px;
  cursor: pointer; transition: all 0.2s;
}
.trend-card:hover { background: var(--surface-hover); border-color: #2a3340; }
.trend-card.expanded { border-color: var(--accent-dim); background: var(--surface-hover); }
.trend-card .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.trend-card .trend-rank {
  font-size: 0.78em; color: var(--text-tertiary); font-weight: 600;
  white-space: nowrap; padding-top: 3px;
}
.trend-card h3 { font-size: 1.15em; font-weight: 700; color: #fff; margin-bottom: 8px; letter-spacing: 0.01em; flex: 1; }
.trend-card .core-insight {
  font-size: 0.95em; color: rgba(255,255,255,0.75); margin-bottom: 12px; line-height: 1.6; transition: color 0.2s;
}
.trend-card .card-footer {
  display: flex; gap: 16px; font-size: 0.8em; color: var(--text-tertiary);
  align-items: center; flex-wrap: wrap;
}
.trend-card .card-footer .signal-count { color: var(--accent); font-weight: 600; }
.trend-card .card-footer .divider { width: 4px; height: 4px; background: var(--border); border-radius: 50%; }

/* Expand Detail */
.trend-detail { display: none; margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border); animation: fadeIn 0.25s ease; }
.trend-card.expanded .trend-detail { display: block; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
.detail-section { margin-bottom: 20px; }
.detail-section h4 {
  font-size: 0.8em; font-weight: 600; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px;
  padding-bottom: 6px; border-bottom: 1px solid var(--border);
}
.detail-section p, .detail-section li { font-size: 0.9em; color: var(--text-primary); line-height: 1.7; }
.detail-section ul { list-style: none; padding: 0; }
.detail-section ul li { padding: 4px 0; }
.opp-list li, .risk-list li { padding: 0; }
.detail-section ul li::before { content: '→ '; color: var(--accent); font-weight: 600; }
.opp-list li::before, .risk-list li::before { content: none !important; }

/* Signals Grid */
.signals-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
.signal-item {
  display: block; background: var(--bg); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; text-decoration: none;
  transition: border-color 0.15s, color 0.15s;
}
.signal-item:hover { border-color: var(--accent-dim); color: var(--accent); }
.signal-item .signal-source { font-size: 0.75em; color: var(--text-tertiary); margin-bottom: 3px; }
.signal-item .signal-title { font-size: 0.88em; color: var(--text-primary); font-weight: 600; margin-bottom: 4px; transition: color 0.15s; }
.signal-item:hover .signal-title { color: var(--accent); }
.signal-item .signal-summary { font-size: 0.82em; color: var(--text-secondary); line-height: 1.5; }

/* Archive */
.archive-section { margin-top: 40px; }
.archive-toggle {
  display: flex; align-items: center; gap: 6px; padding: 12px 0;
  font-size: 0.82em; color: var(--text-tertiary); cursor: pointer;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  user-select: none;
}
.archive-toggle:hover { color: var(--text-secondary); }
.archive-content { display: none; padding: 16px 0; }
.archive-content.open { display: block; }
.archive-item {
  padding: 12px 0; border-bottom: 1px solid var(--border); transition: all 0.2s;
}
.archive-item:last-child { border-bottom: none; }
.archive-item:hover { background: rgba(255,255,255,0.03); }
.archive-item strong { font-size: 0.9em; display: block; margin-bottom: 3px; transition: color 0.2s; }
.archive-item:hover strong { color: var(--accent); }
.archive-item span { font-size: 0.8em; color: var(--text-tertiary); }
.archive-item .archive-desc { font-size: 0.82em; color: var(--text-secondary); margin-top: 4px; line-height: 1.5; }

/* Sources */
.sources-section { margin-top: 32px; }
.sources-toggle {
  display: flex; align-items: center; gap: 6px; padding: 12px 0;
  font-size: 0.82em; color: var(--text-tertiary); cursor: pointer;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  user-select: none;
}
.sources-toggle:hover { color: var(--text-secondary); }
.sources-grid { display: none; padding: 20px 0; }
.sources-grid.open { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 18px; }
.source-category h5 {
  font-size: 0.76em; color: var(--accent); text-transform: uppercase;
  letter-spacing: 1.5px; margin-bottom: 8px; padding-bottom: 4px;
  border-bottom: 1px solid var(--border);
}
.source-category ul { list-style: none; padding: 0; }
.source-category li { padding: 2px 0; font-size: 0.78em; color: var(--text-secondary); }
.source-category li a { color: var(--text-secondary); text-decoration: none; }
.source-category li a:hover { color: var(--accent); }

/* Collapse btn */
.collapse-btn {
  display: inline-block; margin-top: 16px; padding: 6px 16px;
  font-size: 0.8em; color: rgba(255,255,255,0.7); cursor: pointer;
  background: none; border: 1px solid var(--accent-dim); border-radius: 6px;
  transition: all 0.2s;
}
.collapse-btn:hover { color: var(--accent); background: rgba(74,158,255,0.12); border-color: rgba(74,158,255,0.2); }

/* Footer */
.footer {
  margin-top: 48px; padding-top: 24px;
  font-size: 0.75em; color: var(--text-tertiary); text-align: center;
  border-top: 1px solid var(--border);
}

@media (max-width: 640px) {
  .container { padding: 28px 14px 60px; }
  .hero h2 { font-size: 1.4em; }
  .trend-card { padding: 20px 18px; }
  .trend-card h3 { font-size: 1.05em; }
}

/* ================================================================
   EDIT MODE STYLES — isolated, no effect when edit mode is off
   ================================================================ */
#edit-toggle {
  position: fixed; top: 16px; right: 20px; z-index: 9999;
  width: 38px; height: 38px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text-secondary); font-size: 1.25em; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
#edit-toggle:hover { background: var(--surface-hover); color: #fff; }
#edit-toggle.active { background: var(--danger); border-color: var(--danger); color: #fff; }

.edit-mode .editable-block {
  position: relative;
  border: 1px dashed var(--edit-border) !important;
  border-radius: 8px;
  transition: border 0.15s;
}
.edit-mode .editable-block:hover { border-style: solid !important; }

.hide-btn {
  display: none;
  position: absolute; top: -6px; right: -6px; z-index: 10;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--danger); color: #fff; border: none;
  font-size: 10px; line-height: 18px; text-align: center; cursor: pointer;
  pointer-events: auto;
}
.edit-mode .hide-btn { display: block; }

.edit-mode [contenteditable="true"] {
  cursor: text !important;
  border-radius: 3px;
  transition: background 0.12s;
}
.edit-mode [contenteditable="true"]:hover {
  background: var(--edit-hl);
}
.edit-mode [contenteditable="true"]:focus {
  background: rgba(74,158,255,0.14);
  outline: 1px solid var(--accent-dim);
}

/* Floating edit bar */
#edit-bar {
  display: none;
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); z-index: 9998;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 28px; padding: 8px 8px; gap: 6px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.5);
}
.edit-mode #edit-bar { display: flex; }
.edit-bar-btn {
  padding: 10px 22px; border-radius: 22px; border: none;
  font-size: 0.82em; font-weight: 600; cursor: pointer;
  transition: all 0.15s;
}
.edit-bar-btn.save {
  background: var(--accent); color: #fff;
}
.edit-bar-btn.save:hover { background: #5db3ff; }
.edit-bar-btn.export {
  background: transparent; color: var(--text-secondary); border: 1px solid var(--border);
}
.edit-bar-btn.export:hover { color: #fff; border-color: var(--text-secondary); }

/* 机会卡片 */
.opp-list, .risk-list { list-style: none; padding: 0; display: flex; flex-direction: column; gap: 10px; }
.opp-item, .risk-item {
  display: flex; align-items: baseline;
  padding: 16px 20px;
  font-size: 0.85em;
  color: var(--text-primary);
  line-height: 1.6;
  border-radius: 12px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  width: 100%;
  box-sizing: border-box;
  word-break: break-word;
}
.opp-item {
  background: rgba(63,185,80,0.05);
  border: 1px solid rgba(63,185,80,0.16);
}
.risk-item {
  background: rgba(248,81,73,0.05);
  border: 1px solid rgba(248,81,73,0.16);
}
.opp-item::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  background: rgba(63,185,80,0.6);
  border-radius: 50%;
  margin-right: 10px;
  vertical-align: middle;
  flex-shrink: 0;
}
.risk-item::before {
  content: '';
  display: inline-block;
  width: 6px; height: 6px;
  background: rgba(248,81,73,0.6);
  border-radius: 50%;
  margin-right: 10px;
  vertical-align: middle;
  flex-shrink: 0;
}
/* 信息来源折叠 */
.signal-collapse-bar {
  display: flex; align-items: center; gap: 6px; padding: 10px 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  cursor: pointer; font-size: 0.85em; color: rgba(255,255,255,0.85); font-weight: 600;
  user-select: none; transition: all 0.2s;
}
.signal-collapse-bar:hover { color: var(--accent); border-color: var(--accent-dim); }
.signal-collapse-wrapper { position: relative; }
.signal-collapse-wrapper .signals-grid { display: none; margin-top: 10px; }
.signal-collapse-wrapper.expanded .signals-grid { display: flex; }

const LS_PREFIX = 'fi_edit_';
let editMode = false;

function lsKey(k) { return LS_PREFIX + k; }

// Restore hidden blocks from localStorage
function restoreHidden() {
  const hidden = JSON.parse(localStorage.getItem(lsKey('hidden')) || '[]');
  hidden.forEach(function(sel) {
    var el = document.querySelector(sel);
    if (el) el.style.display = 'none';
  });
}

// Restore text edits from localStorage
function restoreTextEdits() {
  const edits = JSON.parse(localStorage.getItem(lsKey('textEdits')) || '{}');
  Object.keys(edits).forEach(function(sel) {
    var el = document.querySelector(sel);
    if (el && edits[sel] !== null) el.textContent = edits[sel];
  });
}

function toggleEditMode() {
  editMode = !editMode;
  var btn = document.getElementById('edit-toggle');
  if (editMode) {
    document.body.classList.add('edit-mode');
    btn.classList.add('active');
    btn.title = '退出编辑模式';
    setAllEditable(true);
    injectHideButtons();
  } else {
    document.body.classList.remove('edit-mode');
    btn.classList.remove('active');
    btn.title = '切换编辑模式';
    setAllEditable(false);
    removeHideButtons();
  }
}

function setAllEditable(editable) {
  var attrs = [
    '.brand h1', '.brand span',
    '.hero h2', '.hero .subtitle', '#updateTime',
    '.core-insight', '.detail-section p', '.detail-section li',
    '.signal-source', '.signal-title', '.signal-summary',
    '.archive-item strong', '.archive-item span', '.archive-desc',
    '.source-category h5', '.source-category li',
    '.footer'
  ];
  attrs.forEach(function(sel) {
    var els = document.querySelectorAll(sel);
    els.forEach(function(el) {
      el.setAttribute('contenteditable', editable ? 'true' : 'false');
    });
  });
  // Trend card titles
  document.querySelectorAll('.trend-card h3').forEach(function(el) {
    el.setAttribute('contenteditable', editable ? 'true' : 'false');
  });
}

function injectHideButtons() {
  // Trend cards
  document.querySelectorAll('.trend-card').forEach(function(card) {
    if (card.querySelector('.hide-btn')) return;
    var btn = document.createElement('button');
    btn.className = 'hide-btn';
    btn.innerHTML = '&#10005;';
    btn.setAttribute('data-hide', '#trend-' + (card.id.replace('trend-','')));
    btn.onclick = function(e) { e.stopPropagation(); hideBlock(card, '#trend-' + (card.id.replace('trend-',''))); };
    card.appendChild(btn);
  });
  // Archive items
  document.querySelectorAll('.archive-item').forEach(function(item, i) {
    if (item.querySelector('.hide-btn')) return;
    var btn = document.createElement('button');
    btn.className = 'hide-btn';
    btn.innerHTML = '&#10005;';
    btn.setAttribute('data-hide', '.archive-item:nth-of-type(' + (i+1) + ')');
    btn.onclick = function(e) { e.stopPropagation(); hideBlock(item, '.archive-item:nth-of-type(' + (i+1) + ')'); };
    item.appendChild(btn);
  });
  // Sources section
  var srcSec = document.querySelector('.sources-section');
  if (srcSec && !srcSec.querySelector('.hide-btn')) {
    var btn = document.createElement('button');
    btn.className = 'hide-btn';
    btn.innerHTML = '&#10005;';
    btn.onclick = function(e) { e.stopPropagation(); hideBlock(srcSec, '.sources-section'); };
    srcSec.appendChild(btn);
  }
  // Archive section
  var archSec = document.querySelector('.archive-section');
  if (archSec && !archSec.querySelector('.hide-btn')) {
    var btn = document.createElement('button');
    btn.className = 'hide-btn';
    btn.innerHTML = '&#10005;';
    btn.onclick = function(e) { e.stopPropagation(); hideBlock(archSec, '.archive-section'); };
    archSec.appendChild(btn);
  }
  // Footer
  var footer = document.querySelector('.footer');
  if (footer && !footer.querySelector('.hide-btn')) {
    var btn = document.createElement('button');
    btn.className = 'hide-btn';
    btn.innerHTML = '&#10005;';
    btn.onclick = function(e) { e.stopPropagation(); hideBlock(footer, '.footer'); };
    footer.appendChild(btn);
  }
}

function removeHideButtons() {
  document.querySelectorAll('.hide-btn').forEach(function(b) { b.remove(); });
}

function hideBlock(el, selector) {
  el.style.display = 'none';
  var hidden = JSON.parse(localStorage.getItem(lsKey('hidden')) || '[]');
  if (hidden.indexOf(selector) === -1) hidden.push(selector);
  localStorage.setItem(lsKey('hidden'), JSON.stringify(hidden));
}

function saveToLocal() {
  // Save text content of all editable fields
  var edits = {};
  var selectors = [
    '.brand h1', '.brand span',
    '.hero h2', '.hero .subtitle', '#updateTime',
    '.trend-card h3', '.core-insight',
    '.detail-section p', '.detail-section li',
    '.signal-source', '.signal-title', '.signal-summary',
    '.archive-item strong', '.archive-item span', '.archive-desc',
    '.source-category h5', '.source-category li',
    '.footer'
  ];
  selectors.forEach(function(sel) {
    document.querySelectorAll(sel).forEach(function(el, i) {
      var key = sel + ':nth-of-type(' + (i+1) + ')';
      edits[key] = el.textContent;
    });
  });
  localStorage.setItem(lsKey('textEdits'), JSON.stringify(edits));
  // Flash feedback
  var btn = document.querySelector('#edit-bar .edit-bar-btn.save');
  var orig = btn.textContent;
  btn.textContent = '已保存';
  btn.style.background = 'var(--success)';
  setTimeout(function() {
    btn.textContent = orig;
    btn.style.background = '';
  }, 1200);
}

function exportHTML() {
  // Temporarily exit edit mode for export
  var wasEditMode = editMode;
  if (wasEditMode) {
    editMode = false;
    document.body.classList.remove('edit-mode');
    setAllEditable(false);
    removeHideButtons();
  }
  var html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  // Re-enter edit mode if needed
  if (wasEditMode) {
    editMode = true;
    document.body.classList.add('edit-mode');
    setAllEditable(true);
    injectHideButtons();
  }
  var blob = new Blob([html], {type: 'text/html'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'future-intelligence-' + new Date().toISOString().slice(0,10) + '.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

                  <div class="signal-title" contenteditable="false">${esc(s.title)}</div>
                  <div class="signal-summary" contenteditable="false">${esc(s.summary)}</div>
                </a>
              `).join('')}
            </div>
          </div>
        </div>
        <button class="collapse-btn" onclick="const card=document.getElementById('trend-${trend.id}');card.classList.remove('expanded');requestAnimationFrame(function(){requestAnimationFrame(function(){card.scrollIntoView({behavior:'smooth',block:'center'});});});event.stopPropagation()">收起</button>
      </div>
    </div>
  `).join('');

  // Archive
  document.getElementById('archiveSection').innerHTML = ARCHIVE_DATA.map((item, i) => `
    <div class="archive-item editable-block">
      <strong contenteditable="false">${esc(item.title)}</strong>
      <span contenteditable="false">${esc(item.source)} · ${item.time}</span>
      <div class="archive-desc" contenteditable="false">${esc(item.summary)}</div>
    </div>
  `).join('');
  document.getElementById('archiveLabel').textContent = `归档 · ${ARCHIVE_DATA.length} 条`;

  // Sources
  document.getElementById('sourcesSection').innerHTML = SOURCES.map(cat => `
    <div class="source-category">
      <h5 contenteditable="false">${cat.cat}</h5>
      <ul>${cat.items.map(i => `<li contenteditable="false">${esc(i)}</li>`).join('')}</ul>
    </div>
  `).join('');

  // Restore state after render
  restoreHidden();
  restoreTextEdits();
  if (editMode) {
    setAllEditable(true);
    injectHideButtons();
  }
}

function toggleArchive() {
  document.getElementById('archiveSection').classList.toggle('open');
}
function toggleSources() {
  document.getElementById('sourcesSection').classList.toggle('open');
}

function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

document.getElementById('updateTime').textContent = '更新于 · ' + new Date().toISOString().slice(0,16).replace('T',' ');

renderTrends();
function toggleSignals(id) {
  const wrap = document.getElementById('sig-wrap-' + id);
  const bar = wrap.querySelector('.signal-collapse-bar span');
  if (wrap.classList.contains('expanded')) {
    wrap.classList.remove('expanded');
    bar.textContent = bar.textContent.replace('▾', '▸');
  } else {
    wrap.classList.add('expanded');
    bar.textContent = bar.textContent.replace('▸', '▾');
  }
}

</script>
</body>
</html>
