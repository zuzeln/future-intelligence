（RSS）", "time": "6/28 15:44", "title": "新浪开源VibeThinker-3B：推理可压缩，事实知识不能", "summary": "新浪发布仅3B参数的VibeThinker-3B，在AIME26等数学编程基准上持平DeepSeek V3.2等大200-333倍的模型，LiveCodeBench超越所有20B以下模型，LeetCode竞赛解决123/128题超过GPT-5.2、Kimi K2.5等。但知识密集型GPQA-Diam", "url": "https://the-decoder.com/sinas-open-model-vibethinker-3b-aims-to-show-reasoning-compresses-well-but-factual-knowledge-doesnt"}, {"source": "The Decoder", "time": "7/1 02:46", "title": "Anthropic's new Claude Sonnet 5 closes the gap to the pricier Opus model series", "summary": "Anthropic released Claude Sonnet 5, which beats its predecessor Sonnet 4.6 across all benchmarks and even edges past the larger Opus 4.8 on the GDPval", "url": "https://the-decoder.com/anthropics-new-claude-sonnet-5-closes-the-gap-to-the-pricier-opus-model-series/"}]}, {"id": 73, "date": "2026-07-01", "title": "AI资本从烧钱走向验证——芯片创收、算力基建与国产替代三线确认商业闭环", "coreInsight": "Etched以50亿美元估值、超10亿美元已签订单验证AI芯片创收能力、黑石300亿美元押注日本数据中心、美团LongCat-2.0以1.6T参数在五万卡国产算力集群上完成全流程训练——AI资本叙事正从「相信未来」切换为「交付现在」。", "whyItMatters": "Etched的10亿美元已签订单是与「意向客户」根本不同的信号——这是客户已经签了合同、锁定了预算的真金白银。美团LongCat-2.0在纯国产算力上完成万亿参数模型训练，则在美国出口管制背景下提供了「去Nvidia化」的可行性证明。三星和SK海力士5900亿美元的联合投资计划直接由AI数据中心需求驱动——Jefferies预测Q3内存价格涨40-50%。这三个信号共同构成了AI资本从「故事估值」到「交付估值」的转变：芯片有订单、模型有国产路径、基础设施有真实回报。亚马逊10亿美元FDE团队的组建则为这一叙事增添了「交付团队也是重资产」的注脚——AI落地本身正在成为一个资本密集型业务。", "direction": "6-12个月内，AI芯片公司将迎来IPO窗口。国产AI算力生态将吸引新一轮资本涌入。AI基础设施投资将从「投模型公司」扩展到「投数据中心、投芯片、投算力供应链」的全链条布局。", "opportunities": ["AI 公司 IPO 的法律合规与风险披露", "面向 AI 行业的投资研究与估值分析", "AI 法律责任保险等新型金融产品", "AI 公司融资顾问与估值服务"], "risks": ["大额融资可能催生 AI 泡沫", "上市后短期业绩压力偏离安全投入"], "signals": [{"source": "TechCrunch", "time": "7/1 02:13", "title": "Nvidia competitor Etched hits $5B valuation, $1B in sales for AI chip", "summary": "Nvidia AI chip competitor Etched says it has already booked $1 billion under contract for the inference systems powered by its chip.", "url": "https://techcrunch.com/2026/06/30/nvidia-competitor-etched-hits-5b-valuation-1b-in-sales-for-ai-chip/"}, {"source": "AI HOT · TechCrunch：AI（RSS）", "time": "7/1 01:52", "title": "Acti 将 AI 智能体直接放入手机键盘", "summary": "新加坡初创公司 Acti 发布基于 Google Gemini 的智能体键盘，可代替用户在应用中执行操作。核心功能 Skills 允许用自然语言创建快捷方式，如长按 T 键翻译消息、C 键发送会议链接。早期测试者两周内创建超 1000 个 Skills。采用本地优先架构，默认不访问私人消息。公司获 ", "url": "https://techcrunch.com/2026/06/30/acti-puts-ai-agents-directly-into-your-smartphone-keyboard"}, {"source": "TechCrunch", "time": "6/30 23:00", "title": "Amazon launches new $1 billion FDE org, following OpenAI and Anthropic", "summary": "Engineers on the new team will embed within companies to deploy purpose-built agents, focusing on fast deployments and customer self-sufficiency.", "url": "https://techcrunch.com/2026/06/30/amazon-launches-new-1-billion-fde-org-following-openai-and-anthropic/"}, {"source": "AI HOT · IT之家（RSS）", "time": "6/30 15:56", "title": "黑石未来3~5年拟投300亿美元在日本建AI数据中心，联合成立AI XPV平台", "summary": "黑石计划未来3~5年在日本AI数据中心领域投资300亿美元，此前的500MW基础上新增超1GW容量。黑石总裁认为AI投资仍处早期，真正风险是算力短缺而非基建泡沫；谷歌、亚马逊是英伟达潜在挑战者。此外，黑石、阿波罗、博通本月9日成立AI XPV平台，目标2028年向OpenAI、Anthropic等提", "url": "https://www.ithome.com/0/970/583.htm"}, {"source": "AI HOT · 公众号：龙猫LongCat（美团）", "time": "7/1 10:24", "title": "美团 LongCat-2.0 正式发布：国产算力集群训练的万亿参数大模型", "summary": "美团于6月30日发布新一代万亿参数大模型LongCat-2.0并开源。总参数1.6T，平均激活约48B，原生支持1M超长上下文，在五万卡国产算力集群上完成全流程训练与推理。采用LSA稀疏注意力、零计算专家、ScMoE及MOPD多专家融合（Agent/Reasoning/Interaction三组专家", "url": "https://mp.weixin.qq.com/s/9XFcx3fmFcmbry5bHMJsow"}, {"source": "AI HOT · The Decoder：AI News（RSS）", "time": "6/29 16:17", "title": "三星和SK海力士计划投资5900亿美元扩产芯片，AI需求推高内存价格", "summary": "在韩国政府支持下，三星和SK海力士计划投入5900亿美元扩大芯片产能，包括800万亿韩元新建四座工厂、81万亿韩元建封装中心，以及未来15年30万亿韩元用于研发下一代芯片。AI数据中心需求是主要驱动力。Jefferies预测，2026年Q3内存价格将上涨40%至50%，Q4再涨30%至40%，202", "url": "https://the-decoder.com/samsung-and-sk-hynix-plan-590-billion-chip-investment-as-ai-demand-sends-memory-prices-soaring"}]}, {"id": 74, "date": "2026-07-01", "title": "英伟达垄断进入倒计时——Etched挑战GPU范式、美团证明无英伟达可训万亿模型", "coreInsight": "Etched以50亿美元估值拿下超10亿美元AI推理芯片订单、美团LongCat-2.0在五万卡国产算力集群上完成1.6T参数模型全流程训练、DeepSeek DSpark投机解码框架加速生成60-85%、台湾突击搜查Super Micro涉嫌向中国走私英伟达芯片——同一天，英伟达的硬件垄断从四个方向被同时挑战。", "whyItMatters": "Etched的订单不是意向书，是已签合同——意味着有客户愿意为「非英伟达」的方案付钱，且是10亿美元级别。美团LongCat-2.0的全流程国产训练是最具说服力的反证：万亿参数模型不依赖英伟达并非理论可能，而是已经做到。DeepSeek DSpark 60-85%的生成加速则从软件层面证明：即使使用现有硬件，架构创新也能大幅缩小算力差距。台湾对Super Micro的突击搜查则从反面揭示英伟达芯片走私已成为跨国执法目标——当一地开始打击芯片走私，意味着这一资源的稀缺性已经达到战略级别。OpenAI同日传出将推理成本减半的消息，则从客户侧表明：即使是最强的AI公司也在拼命降低对GPU的成本依赖。", "direction": "12-24个月内，AI推理芯片市场将出现3-5家可商用替代方案。国产AI芯片生态将从「能用」升级为「好用」。英伟达在AI推理市场的份额将从近乎垄断下降至60-70%。芯片走私与出口管制的博弈将持续升级。", "opportunities": ["AI 推理架构芯片设计自动化", "跨异构定制芯片的云编排平台", "定制芯片策略评估咨询", "芯片供应链管理与产能预测工具"], "risks": ["硬件标准碎片化导致部署复杂", "无力自研芯片的初创公司被排除"], "signals": [{"source": "TechCrunch", "time": "7/1 02:13", "title": "Nvidia competitor Etched hits $5B valuation, $1B in sales for AI chip", "summary": "Nvidia AI chip competitor Etched says it has already booked $1 billion under contract for the inference systems powered by its chip.", "url": "https://techcrunch.com/2026/06/30/nvidia-competitor-etched-hits-5b-valuation-1b-in-sales-for-ai-chip/"}, {"source": "MIT Tech Review", "time": "6/30 18:23", "title": "Building tech in the world’s secret R&D hub", "summary": "Apple. Anthropic. Disney Research. Google. Meta. Microsoft. NVIDIA. OpenAI. Few places outside Silicon Valley can claim R&D hubs from all of these com", "url": "https://www.technologyreview.com/2026/06/30/1139661/building-tech-in-the-worlds-secret-rd-hub/"}, {"source": "The Decoder", "time": "7/1 01:43", "title": "OpenAI reportedly cut response costs for guest ChatGPT users by more than half", "summary": "According to a report by The Information, OpenAI has cut inference costs for its AI models by more than half. The company applied the optimizations to", "url": "https://the-decoder.com/openai-reportedly-cut-response-costs-for-guest-chatgpt-users-by-more-than-half/"}, {"source": "The Decoder", "time": "6/30 16:28", "title": "Deepseek's DSpark boosts AI speed by up to 85 percent, a strategic win under tightening US export co", "summary": "Deepseek's new DSpark framework boosts per-user response speed by 60 to 85 percent. A small model proposes token candidates that the larger model chec", "url": "https://the-decoder.com/deepseeks-dspark-boosts-ai-speed-by-up-to-85-percent-a-strategic-win-under-tightening-us-export-controls/"}, {"source": "The Decoder", "time": "6/30 23:23", "title": "Meituan's LongCat-2.0 shows China can train massive AI models without Nvidia", "summary": "Meituan trains a 1.6 trillion parameter AI model entirely on Chinese chips, no Nvidia required. The article Meituan's LongCat-2.0 shows China can trai", "url": "https://the-decoder.com/meituans-longcat-2-0-shows-china-can-train-massive-ai-models-without-nvidia/"}, {"source": "The Decoder", "time": "6/30 17:43", "title": "Taiwan raids Super Micro offices in probe over Nvidia chip smuggling to China", "summary": "Taiwanese authorities have raided the offices of Super Micro Computer and several local partner companies. The article Taiwan raids Super Micro office", "url": "https://the-decoder.com/taiwan-raids-super-micro-offices-in-probe-over-nvidia-chip-smuggling-to-china/"}]}, {"id": 75, "date": "2026-06-30", "title": "美团万亿参数大模型纯国产训练，Anthropic同日发布自主智能体 Sonnet 5——开源与闭源两线推进 AGI 工程化", "coreInsight": "美团发布 LongCat-2.0——1.6万亿 MoE 在五万张国产 ASIC 完成全流程训练，OpenRouter 月调用量全球前三。Anthropic 发布 Claude Sonnet 5，$2/M 获得浏览器与终端操作能力。Google 推出 4 秒出图 Nano Banana 2 Lite。英伟达 Rubin Ultra 因制造问题取消——AGI 工程化同日四线并进：国产全栈、低价智能体、极廉价生成、算力不确定性。", "whyItMatters": "模型工程正从「追求最强」转向「分工分层」。美团证明国产芯片从头训练万亿模型不是降级替代而是全栈替代——五万卡国产集群跑通 1.6T MoE 意味着中国 AI 在算力封锁下有了真正的自主路径。Sonnet 5 以低价赋予模型自主行动力，为智能体大规模商业落地铺路。Google 极廉价生成模型证明多模态生成边际成本可快速趋零。三线并进构成 AGI 走向工程化的三维路线图。", "direction": "6-12 个月内，国产芯片训练的万亿模型将进入国际第一梯队。Claude Sonnet 5 将催生 3-5 个百万日活智能体应用。Google 极廉价生成模型将在 3-6 个月内倒逼竞品大幅降价。", "opportunities": ["国产算力训练的万亿模型开源，为国内开发者提供脱离海外芯片和 API 依赖的自主方案", "Sonnet 5 的低价智能体能力将催生「AI 操作员」类产品", "极低价图像/视频生成将重塑短视频和广告创意行业成本结构", "国产芯片从「能用」到「好用」的拐点将带动整条国产算力产业链升级"], "risks": ["Rubin Ultra 取消预示芯片迭代可能从 18 个月周期拉长到 24 个月以上，算力瓶颈期延长", "Sonnet 5 自主运行能力如果被滥用（如自动化网络攻击），安全风险不容忽视"], "signals": [{"source": "公众号：龙猫LongCat（美团）", "time": "2026-06-30", "title": "美团 LongCat-2.0 正式发布：国产算力集群训练的万亿参数大模型", "summary": "美团发布新一代万亿参数大模型 LongCat-2.0 并开源。总参数 1.6T，平均激活约 48B，原生支持 1M 超长上下文，在五万卡国产算力集群上完成全流程训练与推理。采用 LSA 稀疏注意力、零计算专家、ScMoE 及 MOPD 多专家融合架构。OpenRouter 月调用量进入全球前三。", "url": "https://mp.weixin.qq.com/s/9XFcx3fmFcmbry5bHMJsow"}, {"source": "Anthropic Newsroom", "time": "2026-06-30", "title": "Claude Sonnet 5 发布", "summary": "Claude Sonnet 5 具备计划、浏览器和终端工具使用能力，可自主运行。输入 token $2/百万，输出 $10/百万。在 BrowseComp 和 OSWorld-Verified 评测中严格优于 Sonnet 4.6。安全评估显示不良行为率更低，幻觉和谄媚减少。", "url": "https://www.anthropic.com/news/claude-sonnet-5"}, {"source": "Google DeepMind Blog", "time": "2026-06-30", "title": "Nano Banana 2 Lite 和 Gemini Omni Flash 发布", "summary": "Nano Banana 2 Lite 为速度最快、成本最低的图像模型（4 秒出图，$0.034/1K分辨率）。Gemini Omni Flash 支持视频生成与对话式编辑（$0.10/秒）。", "url": "https://deepmind.google/blog/start-building-with-nano-banana-2-lite-and-gemini-omni-flash"}, {"source": "公众号：小红书技术", "time": "2026-06-30", "title": "小红书 RedKnot 推理引擎：KV Cache 按注意力头拆解实现长文本加速", "summary": "RedKnot 通过头分类稀疏、稀疏 FFN 和 SegPagedAttention 三大机制统一算法与存储。8 卡 H800 上 TTFT 加速 1.6–3.54×，预填充 FLOPs 削减 67%–79.5%。", "url": "https://mp.weixin.qq.com/s/qRrZvL0aZzYI82djFSrLug"}, {"source": "X: SemiAnalysis", "time": "2026-06-29", "title": "Rubin Ultra取消，新版尺寸性能减半", "summary": "GTC 2026 宣布 Rubin Ultra 仅 3 个月后，原 4-die Rubin Ultra 因制造执行问题被取消。新版尺寸减半，实际性能约为原版一半。", "url": "https://x.com/SemiAnalysis_/status/2071700428249596290"}]}, {"id": 76, "date": "2026-06-30", "title": "Claude Science 工作台与 GeneBench-Pro 同日推出——AI 从「科研工具」升级为「科研基础设施」", "coreInsight": "Anthropic 推出 Claude Science 科研工作台——整合 60+ 预配置技能覆盖基因组学至化学信息学，内置自动引用检查。OpenAI 发布 GeneBench-Pro 评估 AI 处理生物学模糊数据的判断能力。哥伦比亚大学用 prover-verifier LLM 循环攻克 9 个未解数学难题。Meta 公布 Brain2Qwerty v2 非侵入脑电解码实时输出句子——AI 科研基础设施同日四线落地。", "whyItMatters": "科研 AI 正从「工具」升级为「基础设施」。Claude Science 将计算资源和审计机制封装为可复用工作台，大幅降低 AI 辅助科研门槛。GeneBench-Pro 解决科学 AI 评估缺失——AI 在模糊数据中做判断，如何验证？prover-verifier 攻克 9 个开放问题，证明 AI 在数学中正从「辅助」变为「驱动」。Brain2Qwerty v2 标志非侵入脑机接口进入实用化前夜。", "direction": "2026 年底前至少 3-5 个顶级实验室将以 Claude Science 为分析环境。prover-verifier 方法将在 6-12 个月内产生突破。Brain2Qwerty v2 将进入临床辅助。", "opportunities": ["科研工作台降低 AI 辅助科研的工程门槛，中小型实验室将首次具备前沿计算生物学分析能力", "GeneBench-Pro 为 AI 制药公司提供模型选型的标准化评估工具", "prover-verifier 范式可迁移到自动化芯片验证、编译器正确性证明等工业场景", "非侵入脑机接口技术将催生新一代辅助沟通设备和康复产品"], "risks": ["Claude Science 的全流程特性可能导致科学界对单一平台过度依赖，形成新的产业垄断", "AI 自动生成的科学结论如果缺乏独立验证，可能引入系统性偏差"], "signals": [{"source": "Anthropic Newsroom", "time": "2026-06-30", "title": "Claude Science 科研工作台正式上线", "summary": "整合超 60 项预配置技能与连接器，覆盖基因组学、蛋白组学、结构生物学、化学信息学等。内置 reviewer agent 自动检查引用与计算错误，通过 BioNeMo 接入 Evo 2 等模型。beta 版面向 Pro/Max/Team/Enterprise 开放。", "url": "https://www.anthropic.com/news/claude-science-ai-workbench"}, {"source": "OpenAI 官网", "time": "2026-06-30", "title": "GeneBench-Pro：计算生物学研究级基准测试", "summary": "129 个问题覆盖统计遗传学、群体遗传学等 10 个领域 21 个子领域。要求模型探索数据、选择分析路径并迭代实验。82 个问题已由外部领域专家审核确认。", "url": "https://openai.com/index/introducing-genebench-pro"}, {"source": "X: AI Safety Memes", "time": "2026-06-30", "title": "AI 用 prover-verifier LLM 循环攻克 9 个未解数学难题", "summary": "哥伦比亚大学合作者采用 prover-verifier LLM 循环方法，成功解决了理论计算机科学中 9 个重大开放问题，包括一个困扰研究者 2 年的难题。团队计划扩展到所有科学领域。", "url": "https://x.com/AISafetyMemes/status/2072085914558558402"}, {"source": "X: AI at Meta", "time": "2026-06-29", "title": "Meta Brain2Qwerty v2: 非侵入式实时句子解码", "summary": "基于 Nature 上发表的 v1，v2 是性能最高的端到端管道，能从原始脑信号实时解码句子，从字符级提升至解码单词和语义。有望帮助因脑损伤或疾病无法沟通的人群。", "url": "https://x.com/AIatMeta/status/2071566924803395741"}]}, {"id": 77, "date": "2026-06-30", "title": "隐写术、秘密红队、军事误炸、恶意代码四连爆——AI 治理信任在同一天遭遇系统性质疑", "coreInsight": "Claude Code 被曝从 DNS 拉取隐藏恶意代码——代码从未在仓库中，传统扫描器无效。社区发现 Anthropic 在 Claude Code 植入隐写术识别中国用户。Meta 通过「Cannes」项目雇数百人假扮未成年人向 ChatGPT 发送超 4.5 万条自杀提示。美军首次用嵌入 Palantir 的 Claude 选伊朗目标，因情报未更新致约 120 名儿童死亡——AI 治理同日遭遇从代码到军事的全栈信任崩塌。", "whyItMatters": "四条线索覆盖从代码到军事的全栈信任崩塌。隐写术动摇企业对「可信工具」的根本信任。Meta 秘密测试引发红队伦理大讨论——安全测试本身是否需要被监管？美军误炸推向极端——AI 建议的军事目标未被验证时，120 个孩子的生命谁来负责？DNS 隐蔽攻击展示全新威胁面：代码不可见、扫描失效。这一天可能成为 AI 治理的系统性转折点。", "direction": "3-6 个月内，至少 3 个国家将出台 AI 工具代码透明度强制要求。2026 年底前将出现针对 AI 辅助编码的安全扫描标准。1-2 年内国防 AI 人机验证流程将成为多边谈判议题。", "opportunities": ["AI 工具供应链安全将催生新型企业安全产品线（针对 AI 编码工具的行为监控）", "隐写术事件推动「可审计 AI」成为差异化卖点", "红队测试标准化需求将催生独立的第三方 AI 安全审计市场", "国防 AI 验证流程的升级需求将创造 AI 可解释性和人工审查工具的新市场"], "risks": ["企业客户对 AI 编码工具的信任损伤可能导致采用率放缓 1-2 个季度", "美军误炸发酵将加剧全球反 AI 军事化舆论压力，影响 AI 企业国防合同"], "signals": [{"source": "公众号：数字生命卡兹克", "time": "2026-06-30", "title": "Anthropic 在 Claude Code 中植入隐写术代码识别中国用户", "summary": "Claude Code 读取本地时区和环境变量，与加密的 147 个域名列表（含美团、字节跳动等）比对识别中国用户，通过 Unicode 替换方式将分类标记传回服务器。被社区逆向发现。", "url": "https://mp.weixin.qq.com/s/yLb4T2UC16ebKHApdBbgWw"}, {"source": "The Decoder", "time": "2026-06-30", "title": "Meta 秘密测试 ChatGPT 等竞品：承包商假扮未成年发送数万条危机提示", "summary": "Meta 通过「Cannes」项目雇佣数百人假扮未成年人，向 ChatGPT、Gemini 等发送超 4.5 万条自杀/自残/毒品提示。被测试公司均不知情。", "url": "https://the-decoder.com/meta-secretly-tested-chatgpt-gemini-and-character-ai-with-thousands-of-minor-perspective-crisis-prompts"}, {"source": "The Decoder", "time": "2026-06-29", "title": "美军用 AI 选目标却误炸伊朗学校", "summary": "美军首次大规模使用 Anthropic Claude 嵌入 Palantir Maven Smart System 选择目标，首日建议约 1000 个目标，但一所学校被误炸导致约 120 名儿童死亡。情报更新机制缺失。", "url": "https://the-decoder.com/the-us-military-used-ai-to-pick-thousands-of-targets-but-missed-a-note-saying-one-was-a-school"}, {"source": "The Decoder", "time": "2026-06-29", "title": "Claude Code 打开 GitHub 仓库即执行隐藏恶意代码", "summary": "新型 DNS 攻击向量：恶意代码不存在于仓库中，Claude Code 打开仓库后自动执行 setup 脚本，从 DNS 拉取命令。对扫描器和人工审查不可见。", "url": "https://the-decoder.com/claude-code-runs-a-github-repos-hidden-malware-without-verification-giving-attackers-full-control"}, {"source": "IT之家", "time": "2026-06-30", "title": "库克与欧盟科技主管就新版 Siri AI 举行建设性会谈", "summary": "新版 Siri 将转为可调用个人数据的聊天机器人，但苹果以数字市场法互操作义务为由拒绝向竞争对手开放同等权限，暂不进入欧盟。苹果提出「可信系统代理」方案但未开发，要求 18 个月宽限期被拒。", "url": "https://www.ithome.com/0/970/810.htm"}]}, {"id": 78, "date": "2026-06-30", "title": "智能体基础设施进入全栈部署阶段——从企业网关到移动端，从记忆运行时到调试框架同日上线", "coreInsight": "Anthropic 发布 Claude apps gateway——企业自托管控制平面，SSO+按组织消费上限。Claude 在 Microsoft Foundry 可用。Google 发布 ADK Go 2.0 图工作流编排多智能体。EverMind 开源 EverOS 记忆运行时。X 推出 hosted MCP，Cursor for iOS 公测——智能体基础设施同日完成企业网关到移动端全栈闭环。", "whyItMatters": "智能体不再是「模型能力」问题而是「基础设施」问题。apps gateway 解决大规模部署的成本管控和安全——没有消费上限和 SSO，大企业 CIO 不批准。EverOS 解决跨会话记忆退化——没有持久记忆就没有长期协作价值。ADK Go 2.0 解决多 Agent 编排复杂度，X MCP 解决实时公开信息通道。五件事各攻克一个关键瓶颈。", "direction": "3-6 个月内至少 2 家 F500 将以 apps gateway 千人以上部署智能体。2026 年底前 EverOS 类记忆框架将成为智能体平台标配。ADK Go 2.0 图工作流将被 3+ 框架借鉴。", "opportunities": ["企业智能体治理（消费管控、权限、审计）将成为独立 SaaS 品类", "智能体记忆运行时将催生「Agent OS」类平台", "基于 MCP 协议的信息通道标准化将为第三方数据服务商创造新分销渠道", "移动端智能体开发工具和沙盒环境将迎来需求爆发"], "risks": ["Claude apps gateway + Microsoft Foundry 组合可能加剧企业对 Anthropic 生态的锁定效应", "智能体记忆如果包含敏感用户数据且未妥善加密，将成为新的数据泄露攻击面"], "signals": [{"source": "Claude Blog", "time": "2026-06-29", "title": "Claude apps gateway：企业自托管控制平面", "summary": "单无状态容器部署，PostgreSQL 后端。SSO 登录、集中策略管理、按组织/群组/用户的消费上限、路由故障转移。OTLP 遥测。", "url": "https://claude.com/blog/introducing-the-claude-apps-gateway"}, {"source": "Claude Blog", "time": "2026-06-29", "title": "Claude 在 Microsoft Foundry 正式可用", "summary": "托管于 Azure，运行在 NVIDIA GB300 GPU。首提供 Opus 4.8 和 Haiku 4.5。Azure 现有身份验证、计费与治理控制，EA 客户可计入承诺消费。", "url": "https://claude.com/blog/claude-in-microsoft-foundry"}, {"source": "Google Developers Blog", "time": "2026-06-30", "title": "ADK Go 2.0：基于图的多智能体工作流引擎", "summary": "内置人工参与循环、纯 Go 动态执行、指数退避重试。统一执行模型，单 Agent 与复杂图运行在同一运行时。", "url": "https://developers.googleblog.com/announcing-adk-go-20"}, {"source": "MarkTechPost", "time": "2026-06-29", "title": "EverOS：开源 Markdown 优先智能体记忆运行时", "summary": "Apache 2.0 许可。Markdown + SQLite + LanceDB 混合检索。完成的任务自动离线提炼为 Skill。LoCoMo 93.05%，LongMemEval 83.00%。", "url": "https://www.marktechpost.com/2026/06/29/meet-everos-an-open-source-markdown-first-agent-memory-runtime-with-hybrid-bm25-vector-retrieval-and-self-evolving-skills"}, {"source": "Cursor Blog", "time": "2026-06-29", "title": "Cursor for iOS 公测版发布", "summary": "原生 iOS。云端/本地智能体双向切换。语音输入、斜杠命令、锁屏 Live Activities 实时状态。云端智能体在隔离 VM 中运行，可自动生成 PR。", "url": "https://cursor.com/blog/ios-mobile-app"}, {"source": "X: 歸藏", "time": "2026-06-30", "title": "X 发布 hosted X MCP，AI 智能体可直连 X API", "summary": "通过 MCP 协议直连 X API。每次调用 $0.01。支持 Grok、Cursor 等工具。个人按量付费。", "url": "https://x.com/op7418/status/2071816099986022650"}, {"source": "Claude Code GitHub Releases", "time": "2026-06-29", "title": "Claude Code v2.1.196 发布", "summary": "组织默认模型、安全权限收紧、/code-review 合并五个清理查找器 token 减少 25%。终端 UI 优化，流式空闲 5 分钟自动中止。", "url": "https://github.com/anthropics/claude-code/releases/tag/v2.1.196"}]}, {"id": 79, "date": "2026-06-30", "title": "AI 高投入推动增员而非裁员 + 单人管理 5 款产品的新范式——劳动力市场的双重叙事同日交锋", "coreInsight": "Ramp 与 Revelio Labs 对 22,000 家公司的研究：高 AI 投入企业（人均月均 $30+）员工增长 10.2%，入门级岗位增 12%——AI 是扩张工具而非裁员元凶。Every 公开「复利工程」方法论：单人维护 5 款产品，80% 做规划与审查、仅 20% 写代码。具身数据采集员新工种出现（日薪 200-250 元），全球物理交互数据仅约 50 万小时——AI 与劳动力关系同日被三重实证重新定义。", "whyItMatters": "三层叙事给出比「AI 会不会抢走工作」更细微的答案。22,000 家真实数据首次证明 AI 就业效应不是替代而是再分配——持续投入 AI 的企业效率足够高，反而需要更多人来承接增量。复利工程提供个人层面答案：被 AI 放大 5-10 倍效率后，把时间花在 Planning 和 Review 上产出更高。具身数据采集员暗示 AI 正创造「只有人类能做的新数据标注形式」。国务院同日印发 AI 全学段教育规划，人才体系与产业同步重构。", "direction": "2026 年底前更多研究将证实 AI 投入与企业增员正相关。2027 年前复利工程将从个人方法论升级为企业级最佳实践。具身智能数据采集市场 2027 年将扩展至 10 万人以上。", "opportunities": ["AI 投入驱动的企业扩张将催生「AI 转型咨询」和「AI 人才再培训」市场", "复利工程意味着 AI 代码助手应从「实时补全」升级为「知识管理平台」", "具身数据采集将创造不与学历挂钩的新型灵活就业岗位", "AI 全学段教育的推进将催生 K-12 和高教领域的 AI 课程和教学工具市场"], "risks": ["仅「轻量订阅」而未深度投入 AI 的企业可能在 1-2 年内被头部企业以更低成本蚕食市场份额", "单员工管理 5 款产品意味着个人不可替代性下降——如果方法论可复制，效率差距将被迅速抹平"], "signals": [{"source": "TechCrunch", "time": "2026-06-29", "title": "AI 就业争论变得更加混乱", "summary": "Ramp/Revelio Labs 对 22,000 家公司研究发现，高 AI 投入企业总员工增长 10.2%，入门级岗位增长 12%。AI 降低生产成本从而推动增员，但仅购买订阅的公司未见增长。", "url": "https://techcrunch.com/2026/06/29/the-ai-jobs-debate-just-got-messier"}, {"source": "X: 小互", "time": "2026-06-30", "title": "一个人管理 5 款产品：Every 的复利工程", "summary": "Plan→Work→Review→Compound 循环。80% 时间花在 Plan 和 Review，20% 写代码。配套 26 个专项 agent、23 条工作流命令。Claude.md 使 AI 自动避坑。", "url": "https://x.com/xiaohu/status/2071796715162857477"}, {"source": "公众号：数字生命卡兹克", "time": "2026-06-30", "title": "具身智能数据采集员：日薪 200 元起", "summary": "无需学历经验，日薪 200-250 元。遥操作采集穿戴设备控制机器人动作；示教采集徒手重复动作记录轨迹。全球高质量物理交互数据仅约 50 万小时。", "url": "https://mp.weixin.qq.com/s/aSd4kLu7xHllZatrd5EGsw"}, {"source": "IT之家", "time": "2026-06-29", "title": "国务院印发教育「十五五」规划，推进 AI 全学段教育", "summary": "要求提升学生 AI 素养及提出和解决问题的能力。完善科学教育体系，强化科技与人文教育协同，加大拔尖创新人才自主培养力度。", "url": "https://www.ithome.com/0/970/097.htm"}, {"source": "OpenAI 官网", "time": "2026-06-29", "title": "绘制欧洲 AI 劳动力机遇版图", "summary": "OpenAI 发布新报告，分析 AI 对欧盟就业的影响，划定哪些职业面临自动化、增长或工作流程变化。", "url": "https://openai.com/index/mapping-ai-jobs-transition-eu"}, {"source": "Tomer Tunguz 博客", "time": "2026-06-29", "title": "当 AI 成本超过工程师薪酬", "summary": "Anthropic 人均算力支出 $51.5 万/年，是工程师薪资的 2.3 倍。顶尖 1% 软件公司算力支出 $8.9 万，中位数 $1.37 万。三情景预测 2029 年差距缩小路径。", "url": "https://www.tomtunguz.com/ai-spend-breakeven-2029"}]}])
      .then(function(data){
        if(!data || !data.length) return;
        if(data.length > ALL_ITEMS.length){
          var newCount = data.length - ALL_ITEMS.length;
          ALL_ITEMS = data;
          groups = groupByDate(ALL_ITEMS);
          lastUpdateTime = new Date();
          renderSidebar();
          renderPanel();
          if(!ALL_ITEMS.find(function(x){return x.id===activeItemId;})){
            activeItemId = groups[0].items[0].id;

  function showToast(msg){
    var toast = document.getElementById('toast');
    if(!toast) return;
    toast.textContent = msg;
    toast.classList.add('visible');
    setTimeout(function(){
      toast.classList.remove('visible');
    }, 3000);
  }

  function getLastUpdateTime(){
    if(!lastUpdateTime) return '--:--:--';
    var h = String(lastUpdateTime.getHours()).padStart(2,'0');
    var m = String(lastUpdateTime.getMinutes()).padStart(2,'0');
    var s = String(lastUpdateTime.getSeconds()).padStart(2,'0');
    return h + ':' + m + ':' + s;
  }

  function getFooterText(){
    if(!ALL_ITEMS.length) return '';
    var dates=Array.from(new Set(ALL_ITEMS.map(function(i){return i.date;}))).sort();
    var fd=parseInt(dates[0].substr(8,2));
    var fm=parseInt(dates[0].substr(5,2));
    var fy=parseInt(dates[0].substr(0,4));
    var ld=parseInt(dates[dates.length-1].substr(8,2));
    var lm=parseInt(dates[dates.length-1].substr(5,2));
    var ly=parseInt(dates[dates.length-1].substr(0,4));
    var monthStr=fy===ly&&fm===lm?(fy+'年'+fm+'月'):(fy+'年'+fm+'月-'+ly+'年'+lm+'月');
    var rangeStr=fm===lm?('覆盖'+fm+'月'+fd+'日至'+ld+'日'):('覆盖'+fm+'月'+fd+'日至'+lm+'月'+ld+'日');
    var d1=new Date(dates[0]),d2=new Date(dates[dates.length-1]);
    var spanDays=Math.floor((d2-d1)/86400000)+1;
    var cov=dates.length===spanDays?'每天均有 AI 重大事件':('共 '+dates.length+' 天有 AI 重大事件');
    return monthStr+' · 共 '+ALL_ITEMS.length+' 条趋势 · '+rangeStr+'，'+cov;
  }

  // ===== 侧边栏折叠（桌面端） =====
  window.toggleSidebar = function(){
    sidebarCollapsed = !sidebarCollapsed;
    var sb = document.getElementById('sidebar');
    var arrow = document.getElementById('titleArrow');
    var header = document.getElementById('sidebarHeader');
    if(sidebarCollapsed){
      sb.classList.add('collapsed');
      arrow.textContent = '▶';
      header.setAttribute('aria-expanded', 'false');
    }else{
      sb.classList.remove('collapsed');
      arrow.textContent = '▼';
      header.setAttribute('aria-expanded', 'true');
    }
  };

  // ===== 选中条目 =====
  var _selectTimeout=null, _selectPending=null;
  window.selectItem = function(id){
    if(_selectTimeout){clearTimeout(_selectTimeout);}
    if(_selectPending){cancelAnimationFrame(_selectPending);}
    _selectTimeout=setTimeout(function(){
      if(activeItemId===id)return;
      activeItemId=id;
      _selectPending=requestAnimationFrame(function(){
        _selectPending=null;
        renderSidebar();
        renderPanel();
        renderMain();
        renderDateCapsules();
        // Close panel after selection on mobile
        if(panelOpen) closeTrendPanel();
      });
    },16);
  };

  // ===== 搜索 =====
  window.onSearch = function(q){
    searchQuery = q.trim().toLowerCase();
    highlightedItemIdx = -1;
    renderSidebar();
  };

  // ===== 面板搜索（移动端） =====
  window.onPanelSearch = function(q){
    panelSearchQuery = q.trim().toLowerCase();
    renderPanel();
  };

  // ===== 构建趋势条目HTML =====
  function buildTrendItemHtml(it, g, query){
    var titleLower = it.title.toLowerCase();
    if(query && titleLower.indexOf(query)===-1) return null;
    var num = String(g.items.findIndex(function(t){return t.id===it.id;})+1).padStart(2,'0');
    var sigCount = it.signals?it.signals.length:0;
    var displayTitle = query ? highlightText(it.title, query) : esc(it.title);
    var summary = it.coreInsight ? it.coreInsight.substring(0, 20) : '';
    var html = '<div class="trend-item'+(it.id===activeItemId?' active':'')+'" role="option" aria-selected="'+(it.id===activeItemId)+'" tabindex="0" data-id="'+it.id+'" onclick="selectItem('+it.id+')" onkeydown="onItemKeydown(event,'+it.id+')">';
    html += '<span class="trend-number">'+num+'</span>';
    html += '<div class="trend-content">';
    html += '<div class="trend-title">'+displayTitle+'</div>';
    if(summary){
      html += '<div class="trend-summary">'+esc(summary)+'</div>';
    }
    html += '<div class="trend-meta"><span class="trend-tag">趋势</span><span class="trend-signals">'+sigCount+' 信息源</span></div>';
    html += '</div></div>';
    return {hasVisible: true, html: html};
  }

  // ===== 渲染侧边栏（桌面端） =====
  function renderSidebar(){
    var monthGroups = [];
    var currentMonth = null;
    groups.forEach(function(g){
      var monthKey = g.date.substring(0, 7);
      if(!currentMonth || currentMonth.key !== monthKey){
        currentMonth = { key: monthKey, dates: [] };
        monthGroups.push(currentMonth);
      }
      currentMonth.dates.push(g);
    });

    updateSubtitle(monthGroups);

    var h = '';
    monthGroups.forEach(function(mg, mgIdx){
      var parts = mg.key.split('-');
      var monthLabel = parts[0] + '年' + parseInt(parts[1]) + '月';
      var isFirst = mgIdx === 0;
      var monthBodyHtml = '';

      mg.dates.forEach(function(g){
        var groupHasVisible = false;
        var groupHtml = '';
        g.items.forEach(function(it){
          var result = buildTrendItemHtml(it, g, searchQuery);
          if(result){
            groupHasVisible = true;
            groupHtml += result.html;
          }
        });
        if(groupHasVisible){
          monthBodyHtml += '<div class="date-sub-header">'+formatDateLabel(g.date)+'</div>';
          monthBodyHtml += groupHtml;
        }
      });

      if(monthBodyHtml){
        h += '<div class="month-group">';
        h += '<div class="month-header" onclick="toggleMonth(this)">';
        h += '<span class="month-arrow">'+(isFirst?'▼':'▶')+'</span> '+monthLabel;
        h += '</div>';
        h += '<div class="month-body'+(isFirst?'':' collapsed')+'">';
        h += monthBodyHtml;
        h += '</div></div>';
      }
    });

    if(!h){
      h = '<div class="search-empty">未找到匹配的趋势</div>';
    }
    var sidebarScroll = document.getElementById('sidebarScroll');
    if(sidebarScroll) sidebarScroll.innerHTML = h;
  }

  // ===== 渲染下拉面板（移动端） =====
  function renderPanel(){
    var panelScroll = document.getElementById('panelScroll');
    if(!panelScroll) return;

    var monthGroups = [];
    var currentMonth = null;
    groups.forEach(function(g){
      var monthKey = g.date.substring(0, 7);
      if(!currentMonth || currentMonth.key !== monthKey){
        currentMonth = { key: monthKey, dates: [] };
        monthGroups.push(currentMonth);
      }
      currentMonth.dates.push(g);
    });

    var h = '';
    monthGroups.forEach(function(mg, mgIdx){
      var parts = mg.key.split('-');
      var monthLabel = parts[0] + '年' + parseInt(parts[1]) + '月';
      var isFirst = mgIdx === 0;
      var monthBodyHtml = '';

      mg.dates.forEach(function(g){
        var groupHasVisible = false;
        var groupHtml = '';
        g.items.forEach(function(it){
          var result = buildTrendItemHtml(it, g, panelSearchQuery);
          if(result){
            groupHasVisible = true;
            groupHtml += result.html;
          }
        });
        if(groupHasVisible){
          monthBodyHtml += '<div class="date-sub-header">'+formatDateLabel(g.date)+'</div>';
          monthBodyHtml += groupHtml;
        }
      });

      if(monthBodyHtml){
        h += '<div class="month-group">';
        h += '<div class="month-header" onclick="toggleMonth(this)">';
        h += '<span class="month-arrow">'+(isFirst?'▼':'▶')+'</span> '+monthLabel;
        h += '</div>';
        h += '<div class="month-body'+(isFirst?'':' collapsed')+'">';
        h += monthBodyHtml;
        h += '</div></div>';
      }
    });

    if(!h){
      h = '<div class="search-empty">未找到匹配的趋势</div>';
    }
    panelScroll.innerHTML = h;
  }

  function updateSubtitle(monthGroups){
    var el = document.getElementById('sidebarSubtitle');
    if(!el) return;
    if(!monthGroups || monthGroups.length === 0){ el.textContent = ''; return; }
    if(monthGroups.length === 1){
      var parts = monthGroups[0].key.split('-');
      el.textContent = parts[0] + '年' + parseInt(parts[1]) + '月';
    } else {
      var first = monthGroups[0].key.split('-');
      var last = monthGroups[monthGroups.length-1].key.split('-');
      el.textContent = first[0] + '年' + parseInt(first[1]) + '月 - ' + last[0] + '年' + parseInt(last[1]) + '月';
    }
  }

  window.toggleMonth = function(header){
    var body = header.nextElementSibling;
    var arrow = header.querySelector('.month-arrow');
    if(body.classList.contains('collapsed')){
      body.classList.remove('collapsed');
      arrow.textContent = '▼';
    } else {
      body.classList.add('collapsed');
      arrow.textContent = '▶';
    }
  };

  function highlightText(text, query){
    var escaped = esc(text);
    var lower = escaped.toLowerCase();
    var idx = lower.indexOf(query);
    if(idx===-1) return escaped;
    var result = '';
    var lastIdx = 0;
    while(idx!==-1){
      result += escaped.substring(lastIdx, idx);
      result += '<span class="highlight">'+escaped.substring(idx, idx+query.length)+'</span>';
      lastIdx = idx + query.length;
      idx = lower.indexOf(query, lastIdx);
    }
    result += escaped.substring(lastIdx);
    return result;
  }

  // ===== 键盘导航 =====
  window.onItemKeydown = function(event, itemId){
    if(event.key==='Enter'){
      event.preventDefault();
      selectItem(itemId);
    }else if(event.key==='ArrowDown' || event.key==='ArrowUp'){
      event.preventDefault();
      navigateItems(event.key==='ArrowDown'?1:-1);
    }
  };

  function navigateItems(direction){
    var items = document.querySelectorAll('#sidebarScroll .trend-item');
    if(!items.length) return;
    var currentIdx = -1;
    for(var i=0;i<items.length;i++){
      if(parseInt(items[i].getAttribute('data-id'))===activeItemId){ currentIdx=i; break; }
    }
    var newIdx = currentIdx + direction;
    if(newIdx < 0) newIdx = items.length - 1;
    if(newIdx >= items.length) newIdx = 0;
    var newId = parseInt(items[newIdx].getAttribute('data-id'));
    selectItem(newId);
    highlightedItemIdx = newIdx;
    items[newIdx].focus({preventScroll: false});
    items[newIdx].scrollIntoView({block: 'nearest', behavior: 'smooth'});
  }

  // ===== 全局键盘事件 =====
  document.addEventListener('keydown', function(e){
    if(e.key==='Escape'){
      if(panelOpen){
        closeTrendPanel();
      }else if(!sidebarCollapsed){
        toggleSidebar();
      }
    }
    if((e.key==='ArrowDown'||e.key==='ArrowUp') && document.activeElement && document.activeElement.closest('#sidebarScroll')){
      e.preventDefault();
    }
  });

  // ===== 移动端：顶部下拉面板 =====
  window.toggleDrawer = function(){
    if(panelOpen){ closeTrendPanel(); } else { openTrendPanel(false); }
  };

  window.openTrendPanel = function(focusSearch){
    panelOpen = true;
    renderPanel();
    document.getElementById('trendPanel').classList.add('open');
    document.getElementById('mobileOverlay').classList.add('visible');
    document.getElementById('hamburgerBtn').classList.add('open');
    document.body.style.overflow = 'hidden';
    if(focusSearch){
      setTimeout(function(){
        var input = document.getElementById('panelSearchInput');
        if(input) input.focus();
      }, 350);
    }
  };

  window.closeTrendPanel = function(){
    panelOpen = false;
    document.getElementById('trendPanel').classList.remove('open');
    document.getElementById('mobileOverlay').classList.remove('visible');
    document.getElementById('hamburgerBtn').classList.remove('open');
    document.body.style.overflow = '';
  };

  // ===== 移动端：下拉面板手势关闭 =====
  (function(){
    var panel = document.getElementById('trendPanel');
    var touchStartX = 0;
    panel.addEventListener('touchstart', function(e){
      touchStartX = e.touches[0].clientX;
    }, {passive: true});
    panel.addEventListener('touchend', function(e){
      var deltaX = touchStartX - e.changedTouches[0].clientX;
      if(deltaX > 80 && panel.scrollTop <= 5){
        closeTrendPanel();
      }
    });
  })();

  // ===== 移动端：内容区左右滑动翻页 =====
  (function(){
    var main = document.getElementById('mainContent');
    var touchStartX = 0, touchStartY = 0;
    var isSwiping = false;

    main.addEventListener('touchstart', function(e){
      if(e.touches.length !== 1) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      isSwiping = false;
    }, {passive: true});

    main.addEventListener('touchmove', function(e){
      if(e.touches.length !== 1) return;
      if(isSwiping) {
        e.preventDefault();
        return;
      }
      var deltaX = e.touches[0].clientX - touchStartX;
      var deltaY = e.touches[0].clientY - touchStartY;
      if(Math.abs(deltaX) > 15 && Math.abs(deltaX) > Math.abs(deltaY)){
        isSwiping = true;
        e.preventDefault();
      }
    }, {passive: false});

    main.addEventListener('touchend', function(e){
      if(!isSwiping) return;
      isSwiping = false;
      var deltaX = e.changedTouches[0].clientX - touchStartX;
      if(Math.abs(deltaX) < 50) return;

      // Find current item's position in its date group
      var currentItem = ALL_ITEMS.find(function(x){return x.id===activeItemId;});
      if(!currentItem) return;
      var dateGroup = groups.find(function(g){return g.date===currentItem.date;});
      if(!dateGroup) return;
      var idx = dateGroup.items.findIndex(function(it){return it.id===activeItemId;});
      if(idx === -1) return;

      var targetItem = null;
      if(deltaX < -50 && idx < dateGroup.items.length - 1){
        // Swipe left → next
        targetItem = dateGroup.items[idx + 1];
      } else if(deltaX > 50 && idx > 0){
        // Swipe right → previous
        targetItem = dateGroup.items[idx - 1];
      }

      if(targetItem){
        var swipeArea = main.querySelector('.swipe-area');
        if(swipeArea){
          if(deltaX < -50){
            swipeArea.classList.add('swiping-next');
          } else {
            swipeArea.classList.add('swiping-prev');
          }
          setTimeout(function(){
            activeItemId = targetItem.id;
            renderSidebar();
            renderPanel();
            renderMain();
            renderDateCapsules();
          }, 300);
        }
      }
    });
  })();

  window.closeAboutModal = function(e){
    if(e && e.target !== document.getElementById('aboutModal')) return;
    document.getElementById('aboutModal').classList.remove('visible');
  };

  // ===== 日期胶囊（移动端） =====
  function renderDateCapsules(){
    var bar = document.getElementById('capsulesWrap');
    if(!bar) return;
    var html = '';
    groups.forEach(function(g, idx){
      var isActive = g.items.some(function(it){ return it.id === activeItemId; });
      var label = idx === 0 ? '今天' : (function(){
        var d = new Date(g.date + 'T00:00:00');
        return (d.getMonth()+1) + '月' + d.getDate() + '日';
      })();
      html += '<div class="date-capsule' + (isActive ? ' active' : '') + '" data-date="' + g.date + '" onclick="selectDateCapsule(\'' + g.date + '\')">' + label + '</div>';
    });
    bar.innerHTML = html;
  }

  window.selectDateCapsule = function(date){
    var g = groups.find(function(grp){ return grp.date === date; });
    if(!g || !g.items.length) return;
    selectItem(g.items[0].id);
  };

  // ===== 渲染主内容（含滑动包裹层） =====
  function getPerDateRank(it){
    var s = ALL_ITEMS.filter(function(t){return t.date===it.date;});
    return s.findIndex(function(t){return t.id===it.id;})+1;
  }

  function renderMain(){
    var t = ALL_ITEMS.find(function(x){return x.id===activeItemId;});
    if(!t){document.getElementById('mainContent').innerHTML='<div class="empty-state">未找到该条目</div>';return;}
    var r=getPerDateRank(t),rs=String(r).padStart(2,'0');
    var d=new Date(t.date+'T00:00:00'),wd=['日','一','二','三','四','五','六'];
    var dateTitle=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 · 周'+wd[d.getDay()];
    document.getElementById('mainContent').innerHTML=
      '<div class="swipe-area" id="swipeArea">'+
      '<div class="date-capsule-bar" id="dateCapsuleBar"><button class="hamburger-btn" id="hamburgerBtn" onclick="toggleDrawer()" aria-label="打开菜单"><span class="hamburger-line"></span><span class="hamburger-line"></span><span class="hamburger-line"></span></button><div class="capsules-wrap" id="capsulesWrap"></div></div>'+
      '<div class="content-header"><div class="rank-big">'+rs+'</div><div class="category-tag date-title">'+dateTitle+'</div><div class="category-tag desktop-tag">趋势分析 · '+formatDateLabel(t.date)+'</div></div>'+
      '<div class="date-separator"></div>'+
      '<div class="cards">'+
      '<div class="card" style="border:none;padding-bottom:8px;background:transparent;box-shadow:none"><div class="card-title">'+esc(t.title)+'</div></div>'+
      '<div class="card core-insight"><div class="card-body">'+esc(t.coreInsight)+'</div></div>'+
      '<div class="card"><div class="section-label">为什么重要</div><div class="card-body">'+esc(t.whyItMatters)+'</div></div>'+
      '<div class="card"><div class="section-label">趋势方向</div><div class="card-body">'+esc(t.direction)+'</div></div>'+
      '<div class="card"><div class="section-label">机会</div><div class="detail-row"><ul>'+((t.opportunities||[]).map(function(o){return '<li>'+esc(o)+'</li>';})).join('')+'</ul></div></div>'+
      '<div class="card"><div class="section-label">风险</div><div class="detail-row"><ul>'+((t.risks||[]).map(function(r){return '<li>'+esc(r)+'</li>';})).join('')+'</ul></div></div>'+
      '<div class="card"><div class="section-label">信息来源 · '+t.signals.length+' 条</div><div class="signals-list">'+
      (t.signals.map(function(s){return '<a href="'+esc(s.url)+'" target="_blank" rel="noopener" class="signal-item"><div class="signal-source">'+esc(s.source)+' · '+s.time+'</div><div class="signal-title">'+esc(s.title)+'</div><div class="signal-summary">'+esc(s.summary)+'</div></a>';})).join('')+
      '</div></div></div>'+
      '<div class="content-footer">'+getFooterText()+'<span class="last-update">上次更新：'+getLastUpdateTime()+'</span></div>'+
      '</div>';
    document.getElementById('mainContent').scrollTop=0;
  }

  // 启动
  loadData();
})();
</script>
</body>
</html>
